name: CI Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        pip install flask

    - name: Check Python syntax
      run: |
        python -m py_compile app.py
        
    - name: Install Bandit
      run: |
        pip install bandit

    - name: Run Security Scan
      run: |
        bandit -r . || true